# fly.toml app configuration file generated for mtc-backend on 2026-06-20T15:14:27+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mtc-backend'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"


[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
